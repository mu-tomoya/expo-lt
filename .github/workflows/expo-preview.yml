name: preview
on:
  pull_request:

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup EAS CLI
        run: bun install --global eas-cli@latest

      - name: Configure Expo token
        run: echo "EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install

      - name: Create EAS Update
        id: eas_update
        working-directory: .
        run: |
          set -euo pipefail
          OUTPUT_FILE=$(mktemp)
          ERROR_FILE=$(mktemp)
          trap 'rm -f "$OUTPUT_FILE" "$ERROR_FILE"' EXIT

          set +e
          eas update --auto --non-interactive --json >"$OUTPUT_FILE" 2>"$ERROR_FILE"
          EAS_EXIT_CODE=$?
          set -e

          cat "$OUTPUT_FILE"
          if [ -s "$ERROR_FILE" ]; then
            cat "$ERROR_FILE" >&2
          fi

          if [ "$EAS_EXIT_CODE" -ne 0 ]; then
            exit "$EAS_EXIT_CODE"
          fi

          jq -e 'type == "array" and length > 0' "$OUTPUT_FILE" > /dev/null

          GROUP_ID=$(jq -r 'map(select(.group != null)) | .[0].group // empty' "$OUTPUT_FILE")
          BRANCH=$(jq -r 'map(select(.branch != null)) | .[0].branch // empty' "$OUTPUT_FILE")

          if [ -n "$GROUP_ID" ]; then
            echo "group_id=$GROUP_ID" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$BRANCH" ]; then
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Post preview comment
        if: github.event_name == 'pull_request' && steps.eas_update.outputs.group_id !=
          ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROJECT_ID=$(jq -r '.expo.extra.eas.projectId' app.json)
          GROUP_ID="${{ steps.eas_update.outputs.group_id }}"
          BRANCH="${{ steps.eas_update.outputs.branch }}"
          UPDATE_URL="https://u.expo.dev/$PROJECT_ID/group/$GROUP_ID"
          EXPO_GO_URL="exp://u.expo.dev/$PROJECT_ID/group/$GROUP_ID"

          ENCODED_PROJECT_ID=$(jq -rn --arg value "$PROJECT_ID" '$value | @uri')
          ENCODED_GROUP_ID=$(jq -rn --arg value "$GROUP_ID" '$value | @uri')
          QR_CODE_URL="https://qr.expo.dev/eas-update?slug=exp&projectId=$ENCODED_PROJECT_ID&groupId=$ENCODED_GROUP_ID"

          COMMENT_BODY="ЁЯЪА **EAS Update Preview**


          ЁЯУ▒ **Scan QR code to open in Expo Go:**
          ![QR Code]($QR_CODE_URL)

          Manual URL: \`$EXPO_GO_URL\`

          Update URL: \`$UPDATE_URL\`"

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT_BODY"
